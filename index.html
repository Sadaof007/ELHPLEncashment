<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL Encashment Bill - Stylish Version</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Arial, sans-serif; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 30px;
            min-height: 100vh;
        }
        .container { 
            max-width: 1400px; 
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        h2 { 
            color: #2c3e50; 
            border-bottom: 4px solid #667eea;
            padding-bottom: 15px;
            margin-top: 0;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .sheet-tabs { 
            display: flex; 
            gap: 15px; 
            margin: 25px 0;
            flex-wrap: wrap; 
        }
        .tab-btn { 
            padding: 14px 35px; 
            background: linear-gradient(145deg, #f0f0f0, #ffffff);
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 5px 5px 10px #d9d9d9, -5px -5px 10px #ffffff;
        }
        .tab-btn.active { 
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .sheet-pane { 
            display: none; 
            background: white; 
            border-radius: 24px; 
            padding: 30px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            margin-top: 20px; 
            overflow-x: auto; 
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sheet-pane.active { display: block; }
        
        /* Stylish Data Form */
        .data-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .form-group {
            background: #f8fafd;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #e1e8f0;
            transition: all 0.3s ease;
        }
        .form-group:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,.form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            background: white;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-group input[type="number"] {
            -moz-appearance: textfield;
        }
        .form-group input[type="number"]::-webkit-outer-spin-button,
        .form-group input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        table { 
            border-collapse: collapse; 
            width: 100%; 
            font-size: 12px; 
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        th, td { 
            border: 1px solid #e2e8f0; 
            padding: 8px 10px; 
            vertical-align: middle; 
        }
        th { 
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td { background: white; }
        .readonly-field { 
            background: #f8fafd; 
            color: #2c3e50; 
            font-weight: 500; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #e2e8f0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        .grand-total-row { 
            background: linear-gradient(145deg, #f0f5fa, #e6ecf5);
            font-weight: bold;
			font-size:12px;
        }
        .summary-table {
            margin-top: 30px;

            margin-left: auto;
            margin-right: auto;
        }
        .summary-table th {
            background: linear-gradient(145deg, #4a5568, #2d3748);
        }
        
        /* Print Buttons */
        .print-section {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
        }
        .print-btn { 
            background: linear-gradient(145deg, #2c3e50, #1a2634);
            color: white; 
            border: none; 
            padding: 12px 30px; 
            border-radius: 50px; 
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(44, 62, 80, 0.3);
        }
        .print-btn:hover {

        }

            background: linear-gradient(145deg, #27ae60, #219a52);
        }
        .print-btn.bill-btn {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
        }
        .merge-option {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(145deg, #f8fafd, #edf2f7);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 500;
            color: #2c3e50;
            border: 1px solid #cbd5e0;
        }
        .merge-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }
        .footer-note { 
            background: linear-gradient(145deg, #f8fafd, #edf2f7);
            padding: 20px; 
            border-radius: 15px; 
            margin-top: 25px;
            border-left: 5px solid #667eea;
            font-weight: 500;
            color: #2c3e50;
        }
        
        @media print {
            body { background: white; padding: 0; }
            .sheet-tabs, .print-section, .tab-btn, .print-btn, .footer-note, .merge-option { display: none; }
            #data { display: none !important; }
            #proceeding, #bill { display: block !important; box-shadow: none; padding: 15px; }
        }
    </style>
</head>

<script>
    // Helper functions
    function formatDate(dStr) { if(!dStr) return ''; let d = new Date(dStr); return `${d.getDate().toString().padStart(2,'0')}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getFullYear()}`; }
    function day(dStr) { return dStr ? new Date(dStr).getDate() : ''; }
    function month(dStr) { return dStr ? new Date(dStr).getMonth()+1 : ''; }
    function year(dStr) { return dStr ? new Date(dStr).getFullYear() : ''; }

    // Main refresh function
    function refreshAll() {
        // Get inputs
        const ddo_desig = document.getElementById('ddo_desig').value;
        const ddo_office = document.getElementById('ddo_office').value;
        const ddo_mandal = document.getElementById('ddo_mandal').value;
        const ddo_name = document.getElementById('ddo_name').value;
        const ddo_qual = document.getElementById('ddo_qual').value;
        const emp_name = document.getElementById('emp_name').value;
        const emp_id = document.getElementById('emp_id').value;
        const emp_desig = document.getElementById('emp_desig').value;
        const ret_place = document.getElementById('ret_place').value;
        const ret_date = document.getElementById('ret_date').value;
        const total_el = parseFloat(document.getElementById('total_el').value) || 0;
        const total_hpl = parseFloat(document.getElementById('total_hpl').value) || 0;
        const basic_pay = parseFloat(document.getElementById('basic_pay').value) || 0;
        const da_percent = parseFloat(document.getElementById('da_percent').value) || 0;
        const hra_percent = parseFloat(document.getElementById('hra_percent').value) || 0;
        const scale = document.getElementById('scale').value;
        
        // Merge mode
        const mergeMode = document.getElementById('mergeMode')?.checked || false;

        const retDay = ret_date ? day(ret_date) : '';
        const retMonth = ret_date ? month(ret_date) : '';
        const retYear = ret_date ? year(ret_date) : '';

        // Calculations
        const halfPay = Math.round(basic_pay / 2);
        const daOnHalf = Math.round(halfPay * da_percent / 100);
        const totalHalfComp = halfPay + daOnHalf;
        const oneDayRate = Math.round(totalHalfComp / 30);

        let permEL = Math.min(total_el, 300);
        let permHPL = 0;
        if (permEL <= 300) {
            permHPL = Math.min(300 - permEL, total_hpl);
        }

        const hplAmount = oneDayRate * permHPL;

        // Generate row days
        function generateRowDays(basePerm, totalRows = 10) {
            let days = [];
            for (let i = 0; i < totalRows; i++) {
                let remaining = basePerm - (i * 30);
                if (remaining <= 0) days.push(0);
                else days.push(Math.min(30, remaining));
            }
            return days;
        }

        let elDaysPerRow = generateRowDays(permEL, 10);
        let hplDaysPerRow = generateRowDays(permHPL, 10);

        // Calculate EL amounts
        let elAmounts = elDaysPerRow.map(d => d === 0 ? 0 : Math.round((basic_pay / 30) * d));
        let elDA = elAmounts.map(amt => Math.round(amt * da_percent / 100));
        let elHRA = elAmounts.map(amt => Math.round(amt * hra_percent / 100));
        let elTotal = elAmounts.map((amt, idx) => amt + elDA[idx] + elHRA[idx]);

        let sumE13 = elAmounts.reduce((a, b) => a + b, 0);
        let sumF13 = elDA.reduce((a, b) => a + b, 0);
        let sumG13 = elHRA.reduce((a, b) => a + b, 0);
        let sumK13 = elTotal.reduce((a, b) => a + b, 0);

        // Calculate HPL amounts
        let hplAmounts = hplDaysPerRow.map(d => d === 0 ? 0 : Math.round((halfPay / 30) * d));
        let hplDA = hplAmounts.map(amt => Math.round(amt * da_percent / 100));
        let hplTotal = hplAmounts.map((amt, idx) => amt + hplDA[idx]);

        let sumE24 = hplAmounts.reduce((a, b) => a + b, 0);
        let sumF24 = hplDA.reduce((a, b) => a + b, 0);
        let sumK24 = hplTotal.reduce((a, b) => a + b, 0);

        let grandTotalDays = permEL + permHPL;
        let grandTotalBasic = sumE13 + sumE24;
        let grandTotalDA = sumF13 + sumF24;
        let grandTotalHRA = sumG13;
        let grandTotalK = sumK13 + sumK24;

        // PROCEEDING HTML
        let procHtml = `
        <div style="max-width:100%; margin:0 auto; font-size:14px;">
            <h3 style="text-align:center;">PROCEEDING OF THE ${ddo_desig}, ${ddo_office}, ${ddo_mandal}</h3>
            <p style="text-align:center;"><b>Present: ${ddo_name}, ${ddo_qual}</b></p>
			<hr>
           <div style="display: flex; justify-content: space-between; margin: 15px 0; font-family: Trebuchet MS;">
    <div>Proc.No: _________/EL&HPL_Encashment/___________</div>
    <div>Date: ___________________</div>
  </div>
       <div style="display: flex; gap: 10px;">
      <div><u>Sub:</u></div>
      <div style="text-align: justify;">
         Establishment-Encashment of Earned Leaves & Half Pay Leaves - in respect of ${emp_name}, ${emp_desig}, ${ret_place} - due to retired on ${retDay}-${retMonth}-${retYear} - Sanction Orders - Issued.</div>
    </div>     
			
	         <div style="margin: 20px 0;">
    <div style="display: flex; gap: 10px;">
      <div style="font-family: Trebuchet MS;"><u>Ref:</u></div>
      <div style="text-align: justify; font-family: Trebuchet MS; line-height: 1.8;">
        1.GO.Ms.No 232, Dated 16.09.2005.<br />
        2.G.O.Ms.No.51, Finance (HRM-IV) Department, Dated: 11-06-2021.<br>
		3.Circular Memo. No.755-A/33/A1/HRM.IV/2021 Dated: 17-06-2021.<br>
		4.Application of the Individual.
      </div>
    </div>
  </div>
			
            <p style="text-align:center;">-@@@-</p>
            <p><b><u>Order:</u></b></p>
            <p style="text-align:justify;">&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp As per references cited above ${ddo_desig} is accorded permission after due verification of leave account in the service register of ${emp_name}, ${emp_desig}, ${ret_place} who is retired on ${retDay}-${retMonth}-${retYear} for encashment of ${total_el} Days Earned Leaves with equivalent to leave salary and ${total_hpl} Days of Half Pay Leaves with taking in to account of Basic Pay Rs.${basic_pay} and DA ${da_percent}% as on date of Retirement ${retDay}-${retMonth}-${retYear} with subject to the condition that the Earned Leave and Half Pay Leave put together should not exceed 300 Days for Encashment.</p>
            <p><b>The Leave Account details of the employee is as follows:</b></p>
            <table style="width:80%; margin:0 auto; border-collapse:collapse;" border="1">
                <tr><th>Leave</th><th>Total Balance as on ${retDay}-${retMonth}-${retYear}</th><th>No of leaves Permitted to encash</th></tr>
                <tr><td>Earned Leave</td><td style="text-align:center;">${total_el}</td><td style="text-align:center;">${permEL}</td></tr>
                <tr><td>Half Pay Leave</td><td style="text-align:center;">${total_hpl}</td><td style="text-align:center;">${permHPL}</td></tr>
            </table>
            <p><b>HPL's Calculation is as follow:</b></p>
            <table style="width:100%; border-collapse:collapse;" border="1">
                <tr><th>Description</th><th>Amount (Rs.)</th></tr>
                <tr><td style="text-align:center;" colspan="2">Cash Payment in lieu of Half Pay Leave component   =  <br> (HPL Salary admissible on the date of retirement   +   DA admissible on that date) / 30 <br>X (No of days of HPL at credit subject to the total of EL and HPL at credit not exceeding 300 days.)</td></tr>
                <tr><td>HPL Salary (Basic Pay/2)</td><td style="text-align:right;">${halfPay}</td></tr>
                <tr><td>DA on HPL Salary @ ${da_percent}%</td><td style="text-align:right;">${daOnHalf}</td></tr>
                <tr><td><b>Total (HPL Salary + DA)</b></td><td style="text-align:right;"><b>${totalHalfComp}</b></td></tr>
                <tr><td>Divided by 30 (Per Day Rate)</td><td style="text-align:right;">${oneDayRate}</td></tr>
                <tr><td>Multiplied by Permitted HPL Days (${permHPL})</td><td style="text-align:right;">${oneDayRate} X ${permHPL} = <b>Rs. ${hplAmount}</b></td></tr>
                <tr style="background:#e8f0fe;"><td><b>= ${halfPay} + ${daOnHalf} = ${totalHalfComp} / 30 = ${oneDayRate} X ${permHPL} = Rs. ${hplAmount}</b></td><td style="text-align:right;"><b>Rs. ${hplAmount}</b></td></tr>
            </table>
            <p><b>&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbspSanction is hereby accorded for the drawal of Rs.${grandTotalK}/- (EL's Rs.${sumK13} + HPL's Rs.${sumK24}) and to be credit in to the individual account of ${emp_name} who is retired on ${retDay}-${retMonth}-${retYear}.</b></p>
            <p>&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbspNecessary entries are recorded in the Service Register of the individual. It is informed that If any excess amount paid during sanction, the excess amount will be recovered from the Pensionary Benefits of the individual.</p>
            <p><b>Copy to:</b><br>1. Individual Concerned<br>2. Office Copy<br>3. Concerned STO</p>
            <p style="margin-top:30px;text-align:right;">${ddo_name}<br>${ddo_desig}</p>
        </div>`;
        document.getElementById('proceedingContent').innerHTML = procHtml;

        // Calculate total rows for rowspan
        function getTotalRowCount() {
            let count = 0;
            
            // EL rows
            for (let i = 0; i < 10; i++) {
                if (elDaysPerRow[i] > 0) count++;
            }
            
            // EL Total row
            if (permEL > 0) count++;
            
            // HPL rows
            for (let i = 0; i < 10; i++) {
                if (hplDaysPerRow[i] > 0) count++;
            }
            
            // HPL Total row
            if (permHPL > 0) count++;
            
            // Grand Total row
            count++;
            
            return count;
        }

        // BILL HTML - MAIN TABLE
        let mainTableRows = '';
        let totalRows = getTotalRowCount();

        if (mergeMode) {
            // MERGE MODE - కుదించిన బిల్లు (ప్రతి వరుసకు Sl.No)
            let slNo = 1;
            
            // EL Row
            mainTableRows += `<tr>
                <td>${slNo}</td>
                <td>${emp_id}</td>
                <td>${emp_name}, ${emp_desig}, Scale: ${scale} / ${basic_pay}</td>
                <td>${permEL} Days EL</td>
                <td>${sumE13}</td>
                <td>${sumF13}</td>
                <td>${sumG13}</td>
                <td>-</td><td>-</td><td>-</td>
                <td>${sumK13}</td>
                <td>Sanctioned ${permEL} EL</td>
            </tr>`;
            slNo++;
            
            // HPL Row
            if (permHPL > 0) {
                mainTableRows += `<tr>
                    <td>${slNo}</td>
                    <td></td>
                    <td></td>
                    <td>${permHPL} Days HPL</td>
                    <td>${sumE24}</td>
                    <td>${sumF24}</td>
                    <td>0</td>
                    <td>-</td><td>-</td><td>-</td>
                    <td>${sumK24}</td>
                    <td>Sanctioned ${permHPL} HPL</td>
                </tr>`;
                slNo++;
            }
            
            // Grand Total Row
            mainTableRows += `<tr>
                <td>Grand Total</td><td></td><td></td>
                <td>${grandTotalDays}</td>
                <td>${grandTotalBasic}</td><td>${grandTotalDA}</td><td>${grandTotalHRA}</td>
                <td>0</td><td>-</td><td>-</td>
                <td>${grandTotalK}</td><td></td>
            </tr>`;
            
        } else {
            // NORMAL MODE - Sl.No, Emp ID, Name & Designation అన్నీ merge అయ్యి ఉండాలి
            
            // First EL row with employee details (అన్ని వివరాలు ఉంటాయి)
            if (elDaysPerRow[0] > 0) {
                mainTableRows += `<tr>
                    <td rowspan="${totalRows}">1</td>
                    <td rowspan="${totalRows}">${emp_id}</td>
                    <td rowspan="${totalRows}">${emp_name}, ${emp_desig}, Scale: ${scale} / ${basic_pay}</td>
                    <td>${elDaysPerRow[0]} Days EL</td>
                    <td>${elAmounts[0]}</td>
                    <td>${elDA[0]}</td>
                    <td>${elHRA[0]}</td>
                    <td>-</td><td>-</td><td>-</td>
                    <td>${elTotal[0]}</td>
                    <td style="writing-mode:vertical-rl;text-align:center;"rowspan="${totalRows}">The concerned individual has beenSanctioned ${permEL} EL & ${permHPL} HPL vide<br>${ddo_desig}, ${ddo_office}, <br><br> Pro.No._________________ Date._______________</td>
                </tr>`;
            }

            // Remaining EL rows (Sl.No, Emp ID, Name & Designation ఖాళీ)
            for (let i = 1; i < 10; i++) {
                if (elDaysPerRow[i] > 0) {
                    mainTableRows += `<tr>
                        <td>${elDaysPerRow[i]} Days EL</td>
                        <td>${elAmounts[i]}</td>
                        <td>${elDA[i]}</td>
                        <td>${elHRA[i]}</td>
                        <td>-</td><td>-</td><td>-</td>
                        <td>${elTotal[i]}</td>
                        <td></td>
                    </tr>`;
                }
            }

            // EL Total row (Sl.No, Emp ID, Name & Designation ఖాళీ)
            if (permEL > 0) {
                mainTableRows += `<tr class="grand-total-row">
                    <td>Total EL's @ ${permEL}</td>
                    <td>${sumE13}</td><td>${sumF13}</td><td>${sumG13}</td>
                    <td>0</td><td>0</td><td>0</td>
                    <td>${sumK13}</td><td></td>
                </tr>`;
            }

            // HPL rows (Sl.No, Emp ID, Name & Designation ఖాళీ)
            for (let i = 0; i < 10; i++) {
                if (hplDaysPerRow[i] > 0) {
                    mainTableRows += `<tr>
                        <td>${hplDaysPerRow[i]} Days HPL</td>
                        <td>${hplAmounts[i]}</td><td>${hplDA[i]}</td><td>-</td>
                        <td>-</td><td>-</td><td>-</td>
                        <td>${hplTotal[i]}</td><td></td>
                    </tr>`;
                }
            }

            // HPL Total row (Sl.No, Emp ID, Name & Designation ఖాళీ)
            if (permHPL > 0) {
                mainTableRows += `<tr class="grand-total-row">
                    <td>Total HPL's @ ${permHPL}</td>
                    <td>${sumE24}</td><td>${sumF24}</td><td>0</td>
                    <td>0</td><td>-</td><td>-</td>
                    <td>${sumK24}</td><td></td>
                </tr>`;
            }

            // Grand Total row (Sl.No, Emp ID, Name & Designation ఖాళీ)
            mainTableRows += `<tr class="grand-total-row">
                <td>Grand Total EL+HPL @<br> ${grandTotalDays}</td>
              
                <td>${grandTotalBasic}</td><td>${grandTotalDA}</td><td>${grandTotalHRA}</td>
                <td>0</td><td>-</td><td>-</td>
                <td>${grandTotalK}</td><td></td>
            </tr>`;
        }

        // SUMMARY TABLE - గ్రాండ్ టోటల్ తర్వాత వేరే టేబుల్
        let summaryTable = `
        <table class="summary-table" border="1" cellpadding="4" style="border-collapse:collapse; width:80%; margin:30px auto; font-size:11px;">
            <thead>
                <tr><th colspan="3">Leave Details as on ${retDay}.${retMonth}.${retYear}</th><th colspan="3">Permitted to encash</th><th colspan="3">Amount claimed (Rs.)</th></tr>
                <tr><th>EL</th><th>HPL</th><th>Total</th><th>EL</th><th>HPL</th><th>Total</th><th>EL</th><th>HPL</th><th>Total</th></tr>
            </thead>
            <tbody>
                <tr style="text-align:center;">
                    <td>${total_el}</td>
                    <td>${total_hpl}</td>
                    <td>${total_el+total_hpl}</td>
                    <td>${permEL}</td>
                    <td>${permHPL}</td>
                    <td>${permEL+permHPL}</td>
                    <td>${sumK13}</td>
                    <td>${sumK24}</td>
                    <td>${sumK13+sumK24}</td>
                </tr>
            </tbody>
        </table>
        
        <div style="margin-top:20px; padding:15px; background:#f8fafd; ">
            <b>Note :</b><br>
            1. Certified that Total EL + HPL ≤ 300 Days (${permEL} + ${permHPL} = ${permEL+permHPL})<br>
            2. Certified that the amount claimed was neither claimed nor drawn previously.<br>
            3. Certified that necessary entries were made in Service Register.<br>
            <p style="text-align:right;" <b>Signature of the DDO </b></p>
        </div>`;

        // Main table header
        let mainTableHtml = `<h4 style="text-align:center;">Encashment Bill of Earned Leave & Half Pay Leaves</h4>
        <p style="text-align:center;">${emp_name}, ${emp_desig}, ${ret_place} retired on ${retDay}-${retMonth}-${retYear}</p>
        <table border="1" cellpadding="4" style="border-collapse:collapse; width:100%; font-size:11px;">
        <thead>
            <tr><th>Sl.No</th><th>Emp ID</th><th>Name & Designation</th><th>No of Days</th><th>Basic Pay</th><th>DA-${da_percent}%</th><th>HRA-${hra_percent}%</th><th>AHRA</th><th>CCA</th><th>Others</th><th>TOTAL</th><th>Remarks</th></tr>
        </thead>
        <tbody>${mainTableRows}</tbody>
        </table>`;

        // Combine main table and summary table
        let billHtml = mainTableHtml + summaryTable;
        
        document.getElementById('billContent').innerHTML = billHtml;
    }

    // Event listeners
    document.querySelectorAll('.calc-input').forEach(el => el.addEventListener('input', refreshAll));
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.sheet-pane').forEach(p => p.classList.remove('active'));
            document.getElementById(btn.dataset.tab).classList.add('active');
        });
    });
    
    // Add merge mode change listener
    const mergeCheckbox = document.getElementById('mergeMode');
    if (mergeCheckbox) {
        mergeCheckbox.addEventListener('change', refreshAll);
    }
    
    window.addEventListener('load', refreshAll);
</script>
</body>
</html>
